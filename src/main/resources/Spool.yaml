infrastructure:
  watchdog:
    url: "http://localhost:8090"
  
  eventBus:
    type: "KAFKA"
    url: "localhost:9092"
  
  inbox:
    sql:
      type: "postgresql"
      host: "localhost"
      database: "spool"
      user: "spool"
      password: "spool"

  dataLake:
    sql:
      type: "postgresql"
      host: "localhost"
      database: "spool"
      user: "spool"
      password: "spool"

spoolModuleList:
  - crawler:
      id: "msft-crawler"
      source:
        id: "msft"
        poll:
          http:
            url: "https://data.sec.gov/api/xbrl/companyfacts/CIK0000789019.json"
          schedule:
            every: 120
            unit: "SECONDS"
        format: JSON_ARRAY
        rootPath: "facts.dei.EntityCommonStockSharesOutstanding.units.shares"
        enrichment:
          - source: "entityName"
      eventMapping:
        namingConvention: "SNAKE_CASE"
        attributeList:
          - value: "entityName"

