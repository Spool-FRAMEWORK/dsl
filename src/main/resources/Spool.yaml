infrastructure:
  watchdog: "http://host.docker.internal:8090"

  eventBus:
    type: IN_MEMORY

  inbox:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/inbox"

  dataLake:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/datalake"

modules:


  - crawler:
      type: STREAM
      id: test-stream-crawler
      source:
        type: IN_MEMORY
        configuration:
          sourceId: synthea-api-broker
          eventClassName: TestEvent
          scheduleMilliseconds: 30000
        mediaType: EVENT_CLASS
      eventMapping:
        namingConvention: SNAKE_CASE