infrastructure:
  watchdog: "http://host.docker.internal:8090"

  eventBus:
    type: IN_MEMORY

  inbox:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/inbox"

  dataLake:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/datalake"

modules:
  - crawler:
      type: POLL
      id: synthea-crawler
      source:
        type: HTTP
        configuration:
          sourceId: synthea-api
          url: "http://plytrox.com:8000/events?limit=10"
          scheduleMilliseconds: 30000
        mediaType: JSON_ARRAY
        rootPath: events
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - _type